<section class="section" ng-controller="AuthController as authCtrl">
    <div class="auth-card">
        <h2 class="section-title">Create Account</h2>
        <form name="signupForm" ng-submit="authCtrl.signup(signupForm)" novalidate>
            <div class="form-group">
                <label>Name</label><input class="form-input" name="name" ng-model="authCtrl.form.name" required />
            </div>
            <div class="form-group">
                <label>Email</label><input class="form-input" type="email" name="email" ng-model="authCtrl.form.email"
                    required />
            </div>
            <div class="form-group">
                <label>Phone</label><input class="form-input" name="phone" ng-model="authCtrl.form.phone" required />
            </div>
            <div class="form-group">
                <label>Password</label><input class="form-input" type="password" name="password"
                    ng-model="authCtrl.form.password" minlength="6" required />
            </div>
            <button class="btn btn-primary full-btn">Sign Up</button>
            <div class="error-msg" ng-if="authCtrl.error">{{ authCtrl.error }}</div>
        </form>
        <p class="auth-switch">Already registered? <a href="#!/login">Login</a></p>
    </div>
</section>
